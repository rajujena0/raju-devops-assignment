global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'devops-assignment'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(:[0-9]+)?'
        replacement: '${1}'

  - job_name: 'portfolio-app'
    static_configs:
      - targets: ['portfolio-app:8080']
    metrics_path: '/health'
    relabel_configs:
      - target_label: app
        replacement: 'raju-portfolio'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8081']
